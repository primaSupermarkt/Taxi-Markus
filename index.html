<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>TaxiHub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#0d0f14;--bg2:#181b24;--bg3:#1e2130;--border:#323748;--accent:#f5c842;--accent2:#e0a800;--text:#ffffff;--text2:#b0b6cc;--green:#2ecc71;--red:#e74c3c;--blue:#5b9cf6;--orange:#f39c12;--radius:10px;--shadow:0 4px 24px rgba(0,0,0,0.5);}
*{box-sizing:border-box;margin:0;padding:0;}
html{color-scheme:dark;background:#0d0f14;}
body{background:#0d0f14;color:#fff;font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
#startScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;background:#0d0f14;}
.start-logo{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
.start-company{font-size:28px;font-weight:700;color:#fff;text-align:center;line-height:1.2;min-height:36px;}
.start-sub{color:#c0c6dc;font-size:13px;text-align:center;}
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:520px;margin-top:8px;}
.tile{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px 24px;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;flex-direction:column;align-items:center;gap:14px;user-select:none;}
.tile:hover{border-color:var(--accent);transform:translateY(-2px);}
.tile-icon{font-size:38px;line-height:1;}
.tile-label{font-size:16px;font-weight:600;}
.tile-desc{font-size:12px;color:#c0c6dc;text-align:center;}
.tile-admin{grid-column:1/-1;flex-direction:row;padding:14px 20px;gap:12px;opacity:.55;}
.tile-admin:hover{opacity:1;}
.tile-admin .tile-icon{font-size:18px;}
.tile-admin .tile-label{font-size:13px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:420px;box-shadow:var(--shadow);max-height:90vh;overflow-y:auto;}
.modal h2{font-size:18px;font-weight:600;margin-bottom:6px;}
.modal-sub{color:#b0b6cc;font-size:13px;margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:600;color:#b0b6cc;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select{cursor:pointer;}
.field textarea{resize:vertical;min-height:72px;}
.error-msg{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#e74c3c;border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:opacity .2s,transform .1s;user-select:none;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#0d0f14;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:#c0c6dc;}
.btn-ghost:hover{border-color:#fff;color:#fff;}
.btn-danger{background:var(--red);color:#fff;}
.btn-success{background:var(--green);color:#fff;}
.btn-full{width:100%;justify-content:center;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
#appShell{display:none;min-height:100vh;flex-direction:column;background:#0d0f14;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-brand{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--accent);font-weight:600;text-transform:uppercase;}
.topbar-role{font-size:12px;color:#c0c6dc;background:var(--bg3);padding:4px 12px;border-radius:20px;border:1px solid var(--border);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.nav-tabs{display:flex;gap:2px;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.nav-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#c0c6dc;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s;}
.nav-tab:hover{color:#fff;background:var(--bg3);}
.nav-tab.active{background:var(--accent);color:#0d0f14;}
.content{flex:1;padding:24px 20px;overflow-y:auto;background:#0d0f14;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.card-title{font-size:15px;font-weight:600;}
.card-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.badge-new{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
.badge-accepted{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.3);}
.badge-done{background:rgba(139,144,164,.18);color:#c0c6dc;border:1px solid var(--border);}
.badge-declined{background:rgba(231,76,60,.12);color:var(--red);border:1px solid rgba(231,76,60,.3);}
.badge-pending{background:rgba(243,156,18,.12);color:var(--orange);border:1px solid rgba(243,156,18,.3);}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:10px;}
.info-item label{display:block;font-size:11px;color:#9aa0b8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.info-item span{font-size:13px;font-weight:500;}
.cal-nav{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.cal-month{font-size:16px;font-weight:600;flex:1;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;}
.cal-day-header{text-align:center;font-size:11px;color:#9aa0b8;font-weight:600;padding:5px 0;text-transform:uppercase;}
.cal-day{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px;min-height:64px;cursor:pointer;transition:border-color .2s;font-size:12px;}
.cal-day:hover{border-color:var(--accent);}
.cal-day.today{border-color:rgba(245,200,66,.5);}
.cal-day.selected{background:rgba(245,200,66,.08);border-color:var(--accent);}
.cal-day.other-month{opacity:.3;}
.cal-day-num{font-size:12px;font-weight:600;margin-bottom:3px;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:#c0c6dc;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);}
td{padding:11px 14px;border-bottom:1px solid rgba(42,47,63,.5);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.section-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.section-title{font-size:18px;font-weight:700;}
.section-sub{color:#b0b6cc;font-size:13px;margin-top:2px;}
.empty-state{text-align:center;padding:40px 20px;color:#9aa0b8;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:500px){.tile-grid{grid-template-columns:1fr;}.tile-admin{grid-column:1;}.two-col{grid-template-columns:1fr;}}

.pin-display{font-family:monospace;font-size:28px;letter-spacing:8px;text-align:center;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;min-height:54px;color:#fff;}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.pin-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:20px;font-weight:600;color:#fff;cursor:pointer;text-align:center;transition:background .15s;}
.pin-btn:active{background:var(--accent);color:#0d0f14;}
.pin-btn-wide{grid-column:span 2;}
</style>

</head>
<body>
<div id="startScreen">
  <div class="start-logo">Dispositionssystem</div>
  <div class="start-company" id="startCompanyName">TaxiHub</div>
  <p class="start-sub">Bitte Bereich auswaehlen</p>
  <div class="tile-grid">
    <div class="tile" onclick="openLogin('zentrale')">
      <div class="tile-icon">&#127970;</div>
      <div class="tile-label">Zentrale</div>
      <div class="tile-desc">Auftrage anlegen, Fahrer zuweisen, Kalender</div>
    </div>
    <div class="tile" onclick="openLogin('fahrer')">
      <div class="tile-icon">&#128661;</div>
      <div class="tile-label">Fahrer</div>
      <div class="tile-desc">Auftrage sehen, annehmen &amp; abschliessen</div>
    </div>
    <div class="tile tile-admin" onclick="openLogin('admin')">
      <div class="tile-icon">&#9881;</div>
      <div class="tile-label">Admin-Konsole</div>
      <div class="tile-desc">Mitarbeiter &amp; Firmendaten verwalten</div>
    </div>
  </div>
</div>
<div class="overlay" id="loginOverlay" style="display:none">
  <div class="modal">
    <h2 id="loginTitle">Anmeldung</h2>
    <p class="modal-sub" id="loginSub"></p>
    <div class="error-msg" id="loginError">Fehler</div>
    <!-- Trick browser autofill -->
    <input type="text" style="display:none" name="username_fake">
    <input type="text" style="display:none" name="password_fake" autocomplete="new-password">
    <div id="loginUserField" class="field" style="display:none">
      <label>Fahrer auswaehlen</label>
      <select id="loginUserSelect"></select>
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="text" id="loginPass" placeholder="Tippe auf PIN eingeben" readonly autocomplete="off" style="cursor:pointer;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:#fff;width:100%;font-family:monospace;font-size:18px;letter-spacing:4px;text-align:center" onclick="openPinPad('loginPass','PIN eingeben',doLogin)">
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-ghost" onclick="closeLogin()">Abbrechen</button>
      <button class="btn btn-primary" style="flex:1" onclick="doLogin()">Anmelden</button>
    </div>
  </div>
</div>
<div id="appShell">
  <div class="topbar">
    <div class="topbar-brand" id="topbarBrand">TaxiHub</div>
    <div class="topbar-right">
      <div class="topbar-role" id="topbarRole">-</div>
      <button class="btn btn-ghost" style="padding:6px 14px;font-size:13px" onclick="logout()">Abmelden</button>
    </div>
  </div>
  <div class="nav-tabs" id="navTabs"></div>
  <div class="content" id="mainContent"></div>
</div>
<div class="overlay" id="gModal" style="display:none" onclick="if(event.target===this)closeGModal()">
  <div class="modal" style="max-width:460px">
    <h2 id="gModalTitle">-</h2>
    <p class="modal-sub" id="gModalSub"></p>
    <div id="gModalBody"></div>
  </div>
</div>

<!-- Firebase SDKs (compat version - no ES modules) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script>
// ═══════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCQZUY_5PEDWG2aHXK7HA-oBp56sX0-qsE",
  authDomain: "taxi-markus.firebaseapp.com",
  projectId: "taxi-markus",
  storageBucket: "taxi-markus.firebasestorage.app",
  messagingSenderId: "739502094844",
  appId: "1:739502094844:web:0c0e8cbca40c8b15c99a79"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ═══════════════════════════════════════
// DB HELPERS - Firestore statt localStorage
// ═══════════════════════════════════════

// Alle Daten in einem einzigen Firestore-Dokument: taxiapp/data
const DATA_REF = () => db.collection('taxiapp').doc('data');

let _localCache = null;
let _saveTimeout = null;
let _unsubscribe = null;

async function initDB() {
  try {
    const snap = await DATA_REF().get();
    if (snap.exists) {
      _localCache = snap.data();
    } else {
      _localCache = getDefaultDB();
      await DATA_REF().set(_localCache);
    }
    ensureDefaults();
    // Echtzeit-Listener
    _unsubscribe = DATA_REF().onSnapshot((snap) => {
      if (snap.exists) {
        const newData = snap.data();
        // Nur aktualisieren wenn Aenderung von anderem Geraet kam
        _localCache = newData;
        ensureDefaults();
        if (currentRole === 'zentrale') {
          if (zActiveTab === 0) renderZToday();
          else if (zActiveTab === 1) renderZKalender();
        } else if (currentRole === 'fahrer') {
          renderFahrer();
        }
      }
    });
    return _localCache;
  } catch(e) {
    console.error('Firebase init error:', e);
    _localCache = getDefaultDB();
    return _localCache;
  }
}

function getDefaultDB() {
  return {
    employees: [{id:'e1',name:'Markus Bauer',username:'markus',password:'0662',active:true,online:false,gps:null}],
    customers: [],
    rides: [],
    brett: [],
    company: {name:'',street:'',city:'',phone:'',email:''},
    passwords: {zentrale:'0662',admin:'0662'}
  };
}

function ensureDefaults() {
  if (!_localCache) _localCache = getDefaultDB();
  if (!_localCache.employees) _localCache.employees = [{id:'e1',name:'Markus Bauer',username:'markus',password:'0662',active:true,online:false,gps:null}];
  if (!_localCache.customers) _localCache.customers = [];
  if (!_localCache.rides) _localCache.rides = [];
  if (!_localCache.brett) _localCache.brett = [];
  if (!_localCache.company) _localCache.company = {name:'',street:'',city:'',phone:'',email:''};
  if (!_localCache.passwords) _localCache.passwords = {zentrale:'0662',admin:'0662'};
}

function getDB() {
  if (!_localCache) { _localCache = getDefaultDB(); }
  ensureDefaults();
  return _localCache;
}

function saveDB(data) {
  _localCache = data;
  // Debounce: speichert 500ms nach letzter Aenderung
  if (_saveTimeout) clearTimeout(_saveTimeout);
  _saveTimeout = setTimeout(async () => {
    try {
      await DATA_REF().set(_localCache);
    } catch(e) {
      console.error('Firebase save error:', e);
    }
  }, 500);
}

// ═══════════════════════════════════════
// PASSWORT HELPERS
// ═══════════════════════════════════════
var PASS_ZENTRALE = '';
var PASS_ADMIN    = '';

function loadPasswords() {
  var db = getDB();
  PASS_ZENTRALE = db.passwords.zentrale;
  PASS_ADMIN    = db.passwords.admin;
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function pad(n){ return n<10?'0'+n:''+n; }
function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function fmtDate(ds){ if(!ds) return '-'; var p=ds.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function fmtTs(ts){ if(!ts) return '-'; var d=new Date(ts); return pad(d.getHours())+':'+pad(d.getMinutes())+' Uhr'; }
function fmtDuration(from,to){ if(!from||!to) return '-'; var m=Math.round((to-from)/60000); if(m<60) return m+' Min'; return Math.floor(m/60)+'h '+pad(m%60)+'m'; }
function uid(){ return 'id'+Date.now()+Math.floor(Math.random()*1000); }
function normalize(s){ return (s||'').toLowerCase().replace(/\s+/g,''); }
function getCompanyName(){ var db=getDB(); return (db.company&&db.company.name)?db.company.name:'TaxiHub'; }
function refreshBranding(){
  var n=getCompanyName();
  var sc=document.getElementById('startCompanyName'); if(sc) sc.textContent=n;
  var tb=document.getElementById('topbarBrand'); if(tb) tb.textContent=n;
  document.title=n+' Dispo';
}
function pruneOldRides(db){
  var cutoff=new Date(); cutoff.setMonth(cutoff.getMonth()-13);
  var cutStr=cutoff.getFullYear()+'-'+pad(cutoff.getMonth()+1)+'-'+pad(cutoff.getDate());
  db.rides=db.rides.filter(function(r){ return r.date>=cutStr; });
}

// ═══════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════
var currentRole=null, currentUser=null, loginTarget=null;

// PIN PAD
var _pinTarget = '';   // which input id to fill
var _pinValue  = '';   // current digits

function openPinPad(targetId, title, onConfirm) {
  _pinTarget  = targetId;
  _pinValue   = '';
  window._pinConfirmCb = onConfirm;
  var b = '<div id="pinDisplay" class="pin-display">&#8203;</div>';
  b += '<div class="pin-grid">';
  ['1','2','3','4','5','6','7','8','9'].forEach(function(d){
    b += '<button class="pin-btn" onclick="pinPress(this.dataset.d)" data-d="'+d+'">'+d+'</button>';
  });
  b += '<button class="pin-btn" onclick="pinClear()">C</button>';
  b += '<button class="pin-btn" onclick="pinPress(this.dataset.d)" data-d="0">0</button>';
  b += '<button class="pin-btn" onclick="pinBack()">&#9003;</button>';
  b += '</div>';
  b += '<button class="btn btn-primary btn-full" onclick="pinConfirm()">Bestaetigen</button>';
  openGModal(title || 'PIN eingeben', '', b);
}

function pinPress(d) {
  if (_pinValue.length >= 8) return;
  _pinValue += d;
  updatePinDisplay();
}
function pinClear() { _pinValue = ''; updatePinDisplay(); }
function pinBack()  { _pinValue = _pinValue.slice(0,-1); updatePinDisplay(); }
function updatePinDisplay() {
  var el = document.getElementById('pinDisplay');
  if (el) el.textContent = _pinValue.replace(/./g,'*') || String.fromCharCode(8203);
}
function pinConfirm() {
  if (_pinTarget) {
    var el = document.getElementById(_pinTarget);
    if (el) el.value = _pinValue;
  }
  if (window._pinConfirmCb) window._pinConfirmCb(_pinValue);
  closeGModal();
}

function openLogin(role){
  if(!_localCache){
    // Firebase noch nicht bereit - kurz warten und nochmal versuchen
    var btn=event&&event.currentTarget;
    if(btn) btn.style.borderColor='var(--accent)';
    setTimeout(function(){ openLogin(role); }, 500);
    return;
  }
  loginTarget=role;
  loadPasswords();
  document.getElementById('loginError').style.display='none';
  var lp=document.getElementById('loginPass');
  if(lp){lp.value='';lp.setAttribute('autocomplete','off');}
  var titles={zentrale:'Zentrale',fahrer:'Fahrer-Login',admin:'Admin-Konsole'};
  document.getElementById('loginTitle').textContent=titles[role];
  document.getElementById('loginSub').textContent='Passwort eingeben';
  var uf=document.getElementById('loginUserField');
  uf.style.display=role==='fahrer'?'':'none';
  if(role==='fahrer'){
    var db=getDB();
    var sel=document.getElementById('loginUserSelect');
    sel.innerHTML='<option value="">- Fahrer waehlen -</option>';
    db.employees.filter(function(e){return e.active;}).forEach(function(e){
      sel.innerHTML+='<option value="'+e.id+'">'+e.name+'</option>';
    });
  }
  document.getElementById('loginOverlay').style.display='flex';
  setTimeout(function(){ document.getElementById('loginPass').focus(); },60);
}
function closeLogin(){ document.getElementById('loginOverlay').style.display='none'; }

function doLogin(){
  loadPasswords();
  var pass=document.getElementById('loginPass').value.trim();
  var err=document.getElementById('loginError');
  err.style.display='none';
  if(loginTarget==='zentrale'){
    if(pass===PASS_ZENTRALE){ currentRole='zentrale'; currentUser={name:'Zentrale'}; closeLogin(); launchApp(); }
    else{ err.textContent='Falsches Passwort.'; err.style.display=''; }
  } else if(loginTarget==='admin'){
    if(pass===PASS_ADMIN){ currentRole='admin'; currentUser={name:'Admin'}; closeLogin(); launchApp(); }
    else{ err.textContent='Falsches Passwort.'; err.style.display=''; }
  } else if(loginTarget==='fahrer'){
    var sel=document.getElementById('loginUserSelect');
    var empId=sel.value;
    if(!empId){ err.textContent='Bitte Fahrer auswaehlen.'; err.style.display=''; return; }
    var db=getDB();
    var emp=db.employees.find(function(e){ return e.id===empId&&e.password===pass&&e.active; });
    if(emp){
      currentRole='fahrer'; currentUser=emp;
      emp.online=true; saveDB(db); closeLogin(); launchApp();
      registerFCMToken(emp.id);
    } else { err.textContent='Falsches Passwort.'; err.style.display=''; }
  }
}

async function registerFCMToken(empId){
  try {
    if ('serviceWorker' in navigator) {
      await navigator.serviceWorker.register('./firebase-messaging-sw.js');
      await navigator.serviceWorker.ready;
    }
    const messaging = firebase.messaging();
    const VAPID_KEY = 'BNPl1qFPT0NT4D5WPOPUtt4A1L8mkeyGx0D9yDHSyGRsEhKw7NSEQtRCKL9a01JG6DmNMQA2LsDENoN9CLkJ7fs';
    const permission = await Notification.requestPermission();
    if(permission !== 'granted'){ console.log('Push-Berechtigung verweigert'); return; }
    const token = await messaging.getToken({ vapidKey: VAPID_KEY });
    if(token){
      console.log('FCM Token:', token);
      // Direkt in Firestore speichern - umgeht Cache-Problem
      const snap = await DATA_REF().get();
      const data = snap.data();
      const empList = data.employees || [];
      const idx = empList.findIndex(function(e){ return e.id === empId; });
      if(idx !== -1){
        empList[idx].fcmToken = token;
        await DATA_REF().update({ employees: empList });
        console.log('FCM Token in Firestore gespeichert!');
      }
    }
  } catch(e){ console.log('FCM Fehler:', e.message); }
}

function rideCardZ(r,db){
  var emp=r.driverId?db.employees.find(function(e){return e.id===r.driverId;}):null;
  var emp2=r.driverId2?db.employees.find(function(e){return e.id===r.driverId2;}):null;
  var h='<div class="card">';
  h+='<div class="card-header"><div>';
  h+='<div class="card-title">'+r.customerName+'</div>';
  var vtLabels={taxi:'Taxi',rollstuhl:'Rollstuhl',trage:'Trage',liege:'Liege'};
  var vtBadgeColor={rollstuhl:'rgba(231,76,60,.2)',trage:'rgba(243,156,18,.2)',liege:'rgba(243,156,18,.2)',taxi:'rgba(245,200,66,.1)'};
  var vtTextColor={rollstuhl:'#e74c3c',trage:'#f39c12',liege:'#f39c12',taxi:'var(--accent)'};
  var vt=r.vehicleType||'taxi';
  var vtBadge=vt!=='taxi'?' <span style="background:'+vtBadgeColor[vt]+';color:'+vtTextColor[vt]+';border-radius:4px;font-size:10px;font-weight:700;padding:2px 8px;border:1px solid '+vtTextColor[vt].replace(')',', .4)').replace('rgb','rgba')+'">'+vtLabels[vt]+'</span>':'';
  h+='<div class="card-sub">Von: '+r.pickupAddress+(r.destination?' &rarr; '+r.destination:'')+vtBadge+'</div>';
  h+='</div><span class="badge '+STATUS_BADGE[r.status]+'">'+STATUS_LABEL[r.status]+'</span></div>';
  h+='<div class="info-grid">';
  h+='<div class="info-item"><label>Datum</label><span>'+fmtDate(r.date)+'</span></div>';
  h+='<div class="info-item"><label>Uhrzeit</label><span>'+r.time+' Uhr</span></div>';
  h+='<div class="info-item"><label>Fahrer</label><span>'+(emp?emp.name:'-')+'</span></div>';
  if(emp2) h+='<div class="info-item"><label>Backup</label><span>'+emp2.name+'</span></div>';
  if(r.tsAccepted) h+='<div class="info-item"><label>Angenommen</label><span>'+fmtTs(r.tsAccepted)+'</span></div>';
  if(r.tsDone) h+='<div class="info-item"><label>Beendet</label><span>'+fmtTs(r.tsDone)+'</span></div>';
  if(r.tsAccepted&&r.tsDone) h+='<div class="info-item"><label>Dauer</label><span>'+fmtDuration(r.tsAccepted,r.tsDone)+'</span></div>';
  if(r.declineReason) h+='<div class="info-item" style="grid-column:1/-1"><label>Ablehnung</label><span>'+r.declineReason+'</span></div>';
  h+='</div>';
  h+='<div class="btn-row">';

function openNewRideFromCal(){ openNewRide(zCalSel||todayStr()); }
function calNavDispatch(fn){
  if(fn==='calNavZ(-1)') calNavZ(-1);
  else if(fn==='calNavZ(1)') calNavZ(1);
}
function calDayDispatch(el){ var fn=el.dataset.fn; if(fn==='calSelectZ') calSelectZ(el); }

function calendarHTML(selDate,ridesByDate,onDayClick,onPrev,onNext){
  var p=selDate.split('-'); var y=parseInt(p[0]),m=parseInt(p[1])-1;
  var first=new Date(y,m,1); var last=new Date(y,m+1,0); var dow=(first.getDay()+6)%7;
  var h='<div class="cal-nav"><button class="btn btn-ghost" style="padding:6px 12px" onclick="calNavDispatch(this.dataset.fn)" data-fn="'+onPrev+'">&larr;</button>';
  h+='<div class="cal-month">'+MONTHS[m]+' '+y+'</div>';
  h+='<button class="btn btn-ghost" style="padding:6px 12px" onclick="calNavDispatch(this.dataset.fn)" data-fn="'+onNext+'">&rarr;</button></div>';
  h+='<div class="cal-grid">';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(function(d){h+='<div class="cal-day-header">'+d+'</div>';});
  for(var i=0;i<dow;i++) h+='<div class="cal-day other-month"></div>';
  var today=todayStr();
  for(var d=1;d<=last.getDate();d++){
    var ds=y+'-'+pad(m+1)+'-'+pad(d);
    var cls='cal-day'+(ds===today?' today':'')+(ds===selDate?' selected':'');
    var dayRides=ridesByDate[ds]||[];
    var openC=dayRides.filter(function(r){return r.status!=='done';}).length;
    var doneC=dayRides.filter(function(r){return r.status==='done';}).length;
    h+='<div class="'+cls+'" onclick="calDayDispatch(this)" data-fn="'+onDayClick+'" data-ds="'+ds+'">';
    h+='<div class="cal-day-num">'+d+'</div>';
    if(openC>0) h+='<span style="background:rgba(243,156,18,.2);color:#f39c12;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;display:inline-block;margin-top:2px">'+openC+' offen</span>';
    if(doneC>0) h+='<span style="background:rgba(46,204,113,.2);color:#2ecc71;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;display:inline-block;margin-top:2px">'+doneC+' done</span>';
    h+='</div>';
  }
  h+='</div>'; return h;
}

function calNavZ(dir){var p=zCalSel.split('-');var y=parseInt(p[0]),m=parseInt(p[1])-1;m+=dir;if(m<0){m=11;y--;}if(m>11){m=0;y++;}zCalSel=y+'-'+pad(m+1)+'-01';renderZKalender();}
function calSelectZ(el){zCalSel=el.dataset?el.dataset.ds:el;renderZKalender();}

function doSetHistMode(m){ zHistMode=m; if(m==='zeitraum') zHistApplied=false; renderZHistorie(); }

function renderHistZeitraum(){
  var d=new Date(); var y=d.getFullYear(); var m=d.getMonth();
  if(!zHistVon) zHistVon=y+'-'+pad(m+1)+'-01';
  if(!zHistBis) zHistBis=todayStr();
  var h='<div class="card" style="margin-bottom:16px"><div style="font-size:14px;font-weight:600;margin-bottom:14px">Zeitraum auswaehlen</div>';
  h+='<div class="two-col"><div class="field"><label>Von</label><input type="date" id="hzVon" value="'+zHistVon+'"></div>';
  h+='<div class="field"><label>Bis</label><input type="date" id="hzBis" value="'+zHistBis+'"></div></div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  h+='<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="hzQuick(this.dataset.m)" data-m="month">Dieser Monat</button>';
  h+='<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="hzQuick(this.dataset.m)" data-m="lastmonth">Letzter Monat</button>';
  h+='<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="hzQuick(this.dataset.m)" data-m="week">Diese Woche</button>';
  h+='<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="hzQuick(this.dataset.m)" data-m="year">Dieses Jahr</button>';
  h+='</div><button class="btn btn-primary" onclick="applyHzFilter()">Anzeigen</button></div>';
  if(!zHistApplied){ h+='<div class="empty-state"><p>Zeitraum waehlen und Anzeigen druecken.</p></div>'; return h; }
  var db=getDB();
  var rides=db.rides.filter(function(r){return r.status==='done'&&r.date>=zHistVon&&r.date<=zHistBis;});
  rides.sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h+='<span style="color:#b0b6cc;font-size:13px"><strong style="color:#fff">'+rides.length+'</strong> Fahrten</span>';
  h+='<button class="btn btn-primary" style="padding:6px 14px;font-size:13px" onclick="exportZeitraumPDF()">PDF</button></div>';
  if(!rides.length){ h+='<div class="empty-state" style="padding:20px"><p>Keine Fahrten.</p></div>'; return h; }
  var byDate={};rides.forEach(function(r){if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
  Object.keys(byDate).sort().forEach(function(ds){
    h+='<div style="font-size:13px;font-weight:700;color:var(--accent);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">'+fmtDate(ds)+'</div>';
    h+=histTable(byDate[ds],db);
  });
  return h;
}

function applyHzFilter(){
  var v=document.getElementById('hzVon'); var b=document.getElementById('hzBis');
  if(!v||!b) return;
  zHistVon=v.value; zHistBis=b.value;
  if(!zHistVon||!zHistBis){ alert('Bitte beide Daten auswaehlen.'); return; }
  if(zHistVon>zHistBis){ alert('Von muss vor Bis liegen.'); return; }
  zHistApplied=true; renderZHistorie();
}

function hzQuick(mode){
  var d=new Date(); var y=d.getFullYear(); var m=d.getMonth();
  if(mode==='month'){zHistVon=y+'-'+pad(m+1)+'-01';zHistBis=y+'-'+pad(m+1)+'-'+pad(new Date(y,m+1,0).getDate());}
  else if(mode==='lastmonth'){var lm=m===0?11:m-1;var ly=m===0?y-1:y;zHistVon=ly+'-'+pad(lm+1)+'-01';zHistBis=ly+'-'+pad(lm+1)+'-'+pad(new Date(ly,lm+1,0).getDate());}
  else if(mode==='week'){var dow=(d.getDay()+6)%7;var mon=new Date(d);mon.setDate(d.getDate()-dow);var sun=new Date(mon);sun.setDate(mon.getDate()+6);zHistVon=mon.getFullYear()+'-'+pad(mon.getMonth()+1)+'-'+pad(mon.getDate());zHistBis=sun.getFullYear()+'-'+pad(sun.getMonth()+1)+'-'+pad(sun.getDate());}
  else{zHistVon=y+'-01-01';zHistBis=y+'-12-31';}
  zHistApplied=true; renderZHistorie();
}

function exportZeitraumPDF(){
  var db=getDB();

var zHistSuchState={first:'',last:'',addr:'',from:'',to:''};
function renderHistSuche(){

  h+='<div class="field"><label>Abholadresse (optional)</label><input type="text" id="hsAddr" value="'+s.addr+'" placeholder="Strasse, Ort" oninput="zHistSuchState.addr=this.value"></div>';
  h+='<div class="two-col"><div class="field"><label>Von</label><input type="date" id="hsFrom" value="'+s.from+'" oninput="zHistSuchState.from=this.value"></div>';

  h+='<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="doHistSuche()">Suchen</button>';
  h+='<button class="btn btn-ghost" onclick="doHistSucheReset()">Zuruecksetzen</button></div></div>';
  h+='<div id="hsResults"></div>'; return h;
}
function doHistSucheReset(){ zHistSuchState={first:'',last:'',addr:'',from:'',to:''}; renderZHistorie(); }

function doHistSuche(){
  var first=(document.getElementById('hsFirst').value||'').trim();
  var last=(document.getElementById('hsLast').value||'').trim();
  var addr=(document.getElementById('hsAddr').value||'').trim().toLowerCase();
  var from=document.getElementById('hsFrom').value;
  var to=document.getElementById('hsTo').value;
  zHistSuchState={first:first,last:last,addr:addr,from:from,to:to};
  if(!first&&!last){ document.getElementById('hsResults').innerHTML='<div class="empty-state"><p>Bitte Namen eingeben.</p></div>'; return; }
  var db=getDB();
  var results=db.rides.filter(function(r){
    if(r.status!=='done') return false;
    var parts=r.customerName.trim().split(' ');
    var rFirst=parts[0]||''; var rLast=parts.slice(1).join(' ');
    if(first&&normalize(rFirst)!==normalize(first)) return false;
    if(last&&normalize(rLast)!==normalize(last)) return false;
    if(addr&&r.pickupAddress.toLowerCase().indexOf(addr)===-1) return false;
    if(from&&r.date<from) return false;
    if(to&&r.date>to) return false;
    return true;
  });
  results.sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
  window._lastSucheResults=results;
  var h='';
  if(!results.length){ h='<div class="empty-state"><p>Keine Fahrten gefunden.</p></div>'; }
  else{
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    h+='<span style="color:#b0b6cc;font-size:13px"><strong style="color:#fff">'+results.length+'</strong> Fahrten</span>';
    h+='<button class="btn btn-primary" style="padding:6px 14px;font-size:13px" onclick="exportSuchePDF()">PDF</button></div>';
    var byDate={};results.forEach(function(r){if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
    Object.keys(byDate).sort().forEach(function(ds){
      h+='<div style="font-size:13px;font-weight:700;color:var(--accent);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">'+fmtDate(ds)+'</div>';
      h+=histTable(byDate[ds],db);
    });
  }
  document.getElementById('hsResults').innerHTML=h;
}
function exportSuchePDF(){
  var db=getDB(); var s=zHistSuchState;
  openPDFWindow(getCompanyName(),'Fahrten Kunde: '+(s.first+' '+s.last).trim(),window._lastSucheResults||[],db);
}

var zHistFahrerState={driverId:'',from:'',to:''};
function renderHistFahrer(){
  var db=getDB(); var s=zHistFahrerState;
  var opts='<option value="">- Fahrer auswaehlen -</option>';
  db.employees.forEach(function(e){opts+='<option value="'+e.id+'"'+(s.driverId===e.id?' selected':'')+'>'+e.name+'</option>';});

  h+='<button class="btn btn-ghost" style="font-size:11px;padding:4px 10px" onclick="hfQuick(this.dataset.m)" data-m="week">Diese Woche</button>';

  h+='</div>';

}
function doHistFahrerReset(){ zHistFahrerState={driverId:'',from:'',to:''}; renderZHistorie(); }
function hfQuick(mode){
  var d=new Date(); var y=d.getFullYear(); var m=d.getMonth(); var von,bis;
  if(mode==='month'){von=y+'-'+pad(m+1)+'-01';bis=y+'-'+pad(m+1)+'-'+pad(new Date(y,m+1,0).getDate());}
  else if(mode==='lastmonth'){var lm=m===0?11:m-1;var ly=m===0?y-1:y;von=ly+'-'+pad(lm+1)+'-01';bis=ly+'-'+pad(lm+1)+'-'+pad(new Date(ly,lm+1,0).getDate());}
  else if(mode==='week'){var dow=(d.getDay()+6)%7;var mon=new Date(d);mon.setDate(d.getDate()-dow);var sun=new Date(mon);sun.setDate(mon.getDate()+6);von=mon.getFullYear()+'-'+pad(mon.getMonth()+1)+'-'+pad(mon.getDate());bis=sun.getFullYear()+'-'+pad(sun.getMonth()+1)+'-'+pad(sun.getDate());}
  else{von=y+'-01-01';bis=y+'-12-31';}
  zHistFahrerState.from=von; zHistFahrerState.to=bis;
  var fv=document.getElementById('hfFrom'); var fb=document.getElementById('hfTo');
  if(fv) fv.value=von; if(fb) fb.value=bis;
  doHistFahrer();
}
function doHistFahrer(){
  var selEl=document.getElementById('hfDriver');
  var fromEl=document.getElementById('hfFrom');
  var toEl=document.getElementById('hfTo');
  var driverId=selEl?selEl.value:zHistFahrerState.driverId;
  var from=fromEl?fromEl.value:zHistFahrerState.from;
  var to=toEl?toEl.value:zHistFahrerState.to;
  zHistFahrerState={driverId:driverId,from:from,to:to};
  var resEl=document.getElementById('hfResults');
  if(!driverId){ if(resEl) resEl.innerHTML='<div class="empty-state"><p>Bitte Fahrer auswaehlen.</p></div>'; return; }
  var db=getDB();
  var emp=db.employees.find(function(e){return e.id===driverId;});
  var results=db.rides.filter(function(r){
    if(r.status!=='done') return false;
    if(r.driverId!==driverId) return false;
    if(from&&r.date<from) return false;
    if(to&&r.date>to) return false;
    return true;
  });
  results.sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
  window._lastFahrerResults=results;
  var h='';
  if(!results.length){ h='<div class="empty-state"><p>Keine Fahrten gefunden.</p></div>'; }
  else{
    var zeitStr=from&&to?fmtDate(from)+' - '+fmtDate(to):'Gesamt';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
    h+='<div><div style="font-size:15px;font-weight:600">'+(emp?emp.name:'Fahrer')+'</div>';
    h+='<div style="font-size:12px;color:#b0b6cc">'+results.length+' Fahrten &middot; '+zeitStr+'</div></div>';
    h+='<button class="btn btn-primary" style="padding:6px 14px;font-size:13px" onclick="exportFahrerPDF()">PDF</button></div>';
    var byDate={};results.forEach(function(r){if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
    Object.keys(byDate).sort().forEach(function(ds){
      var cnt=byDate[ds].length;
      h+='<div style="font-size:13px;font-weight:700;color:var(--accent);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)">'+fmtDate(ds)+' <span style="font-weight:400;color:#b0b6cc;font-size:11px">('+cnt+')</span></div>';
      h+=histTable(byDate[ds],db);
    });
  }
  if(resEl) resEl.innerHTML=h;
}
function exportFahrerPDF(){
  var db=getDB(); var s=zHistFahrerState;
  var emp=db.employees.find(function(e){return e.id===s.driverId;});
  openPDFWindow(getCompanyName(),'Fahrten Fahrer: '+(emp?emp.name:'')+'  '+fmtDate(s.from)+' - '+fmtDate(s.to),window._lastFahrerResults||[],db);

    rows+='<tr style="background:#f5f5f5"><td colspan="7"><strong>'+fmtDate(ds)+'</strong></td></tr>';
    byDate[ds].forEach(function(r){
      var emp=r.driverId?db.employees.find(function(e){return e.id===r.driverId;}):null;

  html+='<h2>'+company+'</h2><p>'+title+'</p><p>Erstellt: '+fmtDate(todayStr())+'</p>';
  html+='<div class="noprint" style="margin:12px 0"><button onclick="window.print()" style="padding:8px 20px;background:#1a1a2e;color:#f5c842;border:none;border-radius:6px;cursor:pointer">Drucken / PDF</button></div>';
  html+='<table><tr><th>Zeit</th><th>Fahrer</th><th>Kunde</th><th>Von</th><th>Nach</th><th>Zeiten</th><th>Dauer</th></tr>'+rows+'</table></body></html>';
  var w=window.open('','_blank'); if(w){ w.document.write(html); w.document.close(); } else alert('Pop-ups erlauben!');

function acLookup(){
  var first=(document.getElementById('nrFirst').value||'').trim();
  var last=(document.getElementById('nrLast').value||'').trim();
  if(!first||!last) return;
  var customers=window._acCustomers||[];
  var matches=customers.filter(function(cu){return normalize(cu.firstName)===normalize(first)&&normalize(cu.lastName)===normalize(last);});
  if(matches.length>1){ var fe=document.getElementById('nrFrom'); var te=document.getElementById('nrTo'); if(fe&&!fe._manuallyEdited) fe.value=''; if(te&&!te._manuallyEdited) te.value=''; return; }
  if(!matches.length) return;
  var match=matches[0];
  var fromEl=document.getElementById('nrFrom'); if(fromEl&&!fromEl._manuallyEdited) fromEl.value=match.pickupAddress;
  // Also set vehicle type if field exists
  var vtEl=document.getElementById('nrVehicleType');
  if(vtEl&&match.vehicleType) vtEl.value=match.vehicleType;
  var toEl=document.getElementById('nrTo'); if(toEl&&!toEl._manuallyEdited&&match.usualDestination) toEl.value=match.usualDestination;
}

function saveNewRide(){
  var first=(document.getElementById('nrFirst').value||'').trim();
  var last=(document.getElementById('nrLast').value||'').trim();
  var from=document.getElementById('nrFrom').value.trim();
  var to=document.getElementById('nrTo').value.trim();
  var date=document.getElementById('nrDate').value;
  var time=document.getElementById('nrTime').value;
  var driverId=document.getElementById('nrDriver').value;
  if(!first||!last||!from||!date||!time){ alert('Bitte alle Pflichtfelder ausfuellen.'); return; }
  var rideDateTime=new Date(date+'T'+time+':00');
  if(rideDateTime<new Date()){
    openGModal('Fahrt nicht moeglich','','<div style="background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:20px;text-align:center;margin-bottom:16px"><div style="font-size:28px;margin-bottom:8px">!</div><div style="font-size:15px;font-weight:600;color:#e74c3c;margin-bottom:4px">Zeit liegt in der Vergangenheit</div><div style="font-size:13px;color:#b0b6cc">Fahrtaufnahme nicht moeglich.</div></div><button class="btn btn-ghost btn-full" onclick="closeGModal()">Zurueck</button>');
    return;
  }
  var db=getDB();
  var nrVt=document.getElementById('nrVehicleType'); var vehicleType=nrVt?nrVt.value:'taxi';
  var nrRem=document.getElementById('nrReminder'); var reminderMins=nrRem&&nrRem.value?parseInt(nrRem.value):null;
  // Calculate reminder timestamp
  var rideTs=new Date(date+'T'+time+':00').getTime();
  var reminderTs=reminderMins?rideTs-(reminderMins*60000):null;
  db.rides.push({id:uid(),customerName:(first+' '+last).trim(),pickupAddress:from,destination:to,vehicleType:vehicleType,date:date,time:time,status:driverId?'pending':'new',driverId:driverId||null,driverId2:null,createdAt:Date.now(),tsAccepted:null,tsDone:null,declineReason:null,reminderMins:reminderMins,reminderTs:reminderTs,reminderDismissed:false});
  saveDB(db); closeGModal();
  if(zActiveTab===0) renderZToday(); else if(zActiveTab===1) renderZKalender();
}

function getRecurringData(){
  var active=document.getElementById('cRecActive')&&document.getElementById('cRecActive').checked;
  var remEl=document.getElementById('cReminder');
  var reminderMins=remEl&&remEl.value?parseInt(remEl.value):null;
  if(!active) return reminderMins?{active:false,reminderMins:reminderMins}:null;
  var time=(document.getElementById('cRecTime').value||'08:00');
  var days=[];
  document.querySelectorAll('input[name="cRecDay"]:checked').forEach(function(cb){days.push(cb.value);});
  var periodEl=document.querySelector('input[name="cRecPeriod"]:checked');
  var period=periodEl?periodEl.value:'open';
  var until=document.getElementById('cRecUntil').value||null;
  return {active:true,time:time,days:days,period:period,until:period==='until'?until:null,reminderMins:reminderMins};
}

function saveCustomer(id){
  var first=(document.getElementById('cFirst').value||'').trim();
  var last=(document.getElementById('cLast').value||'').trim();
  var addr=(document.getElementById('cAddr').value||'').trim();
  var dest=(document.getElementById('cDest').value||'').trim();
  var vtEl=document.querySelector('input[name="cVehicleType"]:checked');
  var vehicleType=vtEl?vtEl.value:'taxi';
  var recurring=getRecurringData();
  if(!first||!last||!addr){ alert('Vorname, Nachname und Adresse sind Pflicht.'); return; }
  var db=getDB();
  if(id){
    var cu=db.customers.find(function(x){return x.id===id;});
    if(cu){
      cu.firstName=first; cu.lastName=last; cu.pickupAddress=addr;
      cu.usualDestination=dest||null; cu.vehicleType=vehicleType; cu.recurring=recurring;
      // Regenerate recurring rides
      removeRecurringRides(db,id);
      if(recurring&&recurring.active) generateRecurringRides(db,cu);
    }
  } else {
    var newCu={id:uid(),firstName:first,lastName:last,pickupAddress:addr,usualDestination:dest||null,vehicleType:vehicleType,recurring:recurring};
    db.customers.push(newCu);
    if(recurring&&recurring.active) generateRecurringRides(db,newCu);
  }
  saveDB(db); closeGModal(); renderZKunden();
}

function removeRecurringRides(db,customerId){
  db.rides=db.rides.filter(function(r){return r.recurringCustomerId!==customerId;});
}

function generateRecurringRides(db,cu){
  var rec=cu.recurring; if(!rec||!rec.active||!rec.days||!rec.days.length) return;
  var dayMap={MO:1,DI:2,MI:3,DO:4,FR:5,SA:6,SO:0};
  var start=new Date(); start.setHours(0,0,0,0);
  var end;
  if(rec.period==='until'&&rec.until){
    end=new Date(rec.until); end.setHours(23,59,59,0);
  } else {
    end=new Date(); end.setFullYear(end.getFullYear()+2); // offenes Ende = 2 Jahre voraus
  }
  var current=new Date(start);
  var count=0;
  while(current<=end && count<500){
    var dow=current.getDay();
    var matched=rec.days.find(function(d){return dayMap[d]===dow;});
    if(matched){
      var ds=current.getFullYear()+'-'+pad(current.getMonth()+1)+'-'+pad(current.getDate());
      // Check not already existing
      var exists=db.rides.find(function(r){return r.recurringCustomerId===cu.id&&r.date===ds;});
      if(!exists){
        var rideTs=new Date(ds+'T'+rec.time+':00').getTime();
        var remMins=rec.reminderMins||null;
        var remTs=remMins?rideTs-(remMins*60000):null;
        db.rides.push({
          id:uid(),
          customerName:cu.firstName+' '+cu.lastName,
          pickupAddress:cu.pickupAddress,
          destination:cu.usualDestination||'',
          vehicleType:cu.vehicleType||'taxi',
          date:ds,
          time:rec.time,
          status:'new',
          driverId:null,
          driverId2:null,
          createdAt:Date.now(),
          tsAccepted:null,
          tsDone:null,
          declineReason:null,
          recurringCustomerId:cu.id,
          reminderMins:remMins,
          reminderTs:remTs,
          reminderDismissed:false
        });
        count++;
      }
    }
    current.setDate(current.getDate()+1);
  }
}

function toggleRecurring(customerId){
  var db=getDB();
  var cu=db.customers.find(function(x){return x.id===customerId;});
  if(!cu||!cu.recurring) return;
  cu.recurring.active=!cu.recurring.active;
  if(cu.recurring.active){
    generateRecurringRides(db,cu);
  } else {
    removeRecurringRides(db,customerId);
  }
  saveDB(db); renderZKunden();
}

// Reverse Geocoding Cache
var _geoCache = {};

async function getOrtName(lat, lng) {
  var key = lat.toFixed(3) + ',' + lng.toFixed(3);
  if (_geoCache[key]) return _geoCache[key];
  try {
    var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng + '&zoom=10&accept-language=de';
    var resp = await fetch(url, {headers:{'User-Agent':'TaxiHubApp/1.0'}});
    var data = await resp.json();
    var addr = data.address || {};
    var ort = addr.city || addr.town || addr.village || addr.municipality || addr.county || 'Unbekannt';
    var result = ort;
    _geoCache[key] = result;
    return result;
  } catch(e) {
    return lat.toFixed(4) + ', ' + lng.toFixed(4);
  }
}

// SCHWARZES BRETT
function renderZBrett(){
  var db=getDB(); if(!db.brett) db.brett=[];
  var h='<div class="section-header"><div><div class="section-title">Schwarzes Brett</div><div class="section-sub">'+db.brett.length+' Eintraege</div></div>';
  h+='<button class="btn btn-primary" onclick="openNewBrettMsg()">+ Nachricht</button></div>';
  if(!db.brett.length){ h+='<div class="empty-state"><p>Keine Nachrichten.</p></div>'; }
  else{
    var msgs=db.brett.slice().sort(function(a,b){return b.createdAt-a.createdAt;});
    msgs.forEach(function(msg){
      var empDb=db.employees;
      var targetName=msg.targetId==='all'?'Alle Fahrer':(empDb.find(function(e){return e.id===msg.targetId;})||{name:'?'}).name;
      var confirmedBy=msg.confirmedBy||[];
      var targets=msg.targetId==='all'?empDb.filter(function(e){return e.active;}):[empDb.find(function(e){return e.id===msg.targetId;})].filter(Boolean);
      var pending=targets.filter(function(e){return confirmedBy.indexOf(e.id)===-1;});
      var allDone=pending.length===0;
      h+='<div class="card" style="'+(allDone?'border-color:rgba(46,204,113,.4);':'border-color:rgba(245,200,66,.3);')+'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div>';
      h+='<div style="font-size:11px;color:#b0b6cc;margin-bottom:3px">An: <strong style="color:#fff">'+targetName+'</strong> &middot; '+fmtDate(msg.date)+(msg.time?' '+msg.time+' Uhr':'')+'</div>';
      h+='<div style="font-size:15px;font-weight:600">'+msg.text+'</div></div>';
      h+=allDone?'<span style="background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;white-space:nowrap">Alle bestaetigt</span>':'<span style="background:rgba(243,156,18,.12);color:#f39c12;border:1px solid rgba(243,156,18,.3);border-radius:20px;font-size:11px;font-weight:700;padding:3px 10px;white-space:nowrap">'+pending.length+' ausstehend</span>';
      h+='</div>';
      if(targets.length){ h+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">'; targets.forEach(function(e){ var done=confirmedBy.indexOf(e.id)!==-1; h+='<span style="font-size:11px;padding:2px 8px;border-radius:12px;background:'+(done?'rgba(46,204,113,.15)':'rgba(139,144,164,.1)')+';color:'+(done?'#2ecc71':'#9aa0b8')+';border:1px solid '+(done?'rgba(46,204,113,.3)':'var(--border)')+'">'+e.name+(done?' ok':'')+'</span>'; }); h+='</div>'; }
      h+='<div class="btn-row" style="margin-top:12px"><button class="btn btn-danger" style="padding:6px 12px;font-size:12px" onclick="deleteBrettMsg(this.dataset.id)" data-id="'+msg.id+'">Loeschen</button></div>';
      h+='</div>';
    });
  }
  document.getElementById('mainContent').innerHTML=h;
}
function openNewBrettMsg(){
  var db=getDB();
  var opts='<option value="all">Alle Fahrer</option>';
  db.employees.filter(function(e){return e.active;}).forEach(function(e){opts+='<option value="'+e.id+'">'+e.name+'</option>';});
  var b='<div class="field"><label>Empfaenger</label><select id="brettTarget">'+opts+'</select></div>';
  b+='<div class="field"><label>Nachricht</label><textarea id="brettText" placeholder="z. B. Heute um 12 Uhr TUeV-Termin!" style="min-height:100px"></textarea></div>';
  b+='<div class="two-col"><div class="field"><label>Datum (optional)</label><input type="date" id="brettDate" value="'+todayStr()+'"></div>';
  b+='<div class="field"><label>Uhrzeit (optional)</label><input type="time" id="brettTime"></div></div>';
  b+='<div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="closeGModal()">Abbrechen</button><button class="btn btn-primary" style="flex:1" onclick="saveBrettMsg()">Veroeffentlichen</button></div>';
  openGModal('Neue Brett-Nachricht','',b);
}
function saveBrettMsg(){
  var targetId=document.getElementById('brettTarget').value||'all';
  var text=(document.getElementById('brettText').value||'').trim();
  var date=document.getElementById('brettDate').value; var time=document.getElementById('brettTime').value;
  if(!text){ alert('Bitte Nachricht eingeben.'); return; }
  var db=getDB(); if(!db.brett) db.brett=[];
  db.brett.push({id:uid(),targetId:targetId,text:text,date:date||'',time:time||'',createdAt:Date.now(),confirmedBy:[]});
  saveDB(db); closeGModal(); renderZBrett();
}
function deleteBrettMsg(id){
  window._delBrettId=id;
  var b='<div style="background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:8px;padding:14px;margin-bottom:14px">Nachricht wirklich loeschen?</div>';
  b+='<div style="display:flex;gap:8px"><button class="btn btn-ghost" style="flex:1" onclick="closeGModal()">Abbrechen</button><button class="btn btn-danger" style="flex:1" onclick="doDeleteBrettMsg()">Loeschen</button></div>';
  openGModal('Brett-Eintrag loeschen?','',b);
}
function doDeleteBrettMsg(){ var db=getDB(); if(!db.brett) db.brett=[]; db.brett=db.brett.filter(function(m){return m.id!==window._delBrettId;}); saveDB(db); closeGModal(); renderZBrett(); }

// GPS
var _gpsEnabled=false, _gpsWatchId=null, _lastPos=null;

function setupFahrer(){
  document.getElementById('navTabs').innerHTML='';
  showGpsConsent();
}
function showGpsConsent(){
  var b='<div style="text-align:center;padding:8px 0">';
  b+='<div style="font-size:40px;margin-bottom:12px">GPS</div>';
  b+='<div style="font-size:16px;font-weight:700;margin-bottom:8px">Standort-Freigabe</div>';
  b+='<div style="font-size:13px;color:#b0b6cc;margin-bottom:20px;line-height:1.6">Diese App uebertraegt deinen Standort an die Zentrale solange du eingeloggt bist.<br>Der Standort wird <strong style="color:#fff">nicht dauerhaft gespeichert</strong>.<br><br>Du kannst GPS jederzeit ein- und ausschalten.</div>';
  b+='<div style="display:flex;gap:8px;flex-direction:column"><button class="btn btn-primary btn-full" onclick="fahrerGpsStart(true)">GPS aktivieren</button>';
  b+='<button class="btn btn-ghost btn-full" onclick="fahrerGpsStart(false)">Ohne GPS fortfahren</button></div></div>';
  openGModal('Standort-Freigabe','',b);
}
function fahrerGpsStart(enabled){ closeGModal(); _gpsEnabled=enabled; if(enabled) startGpsTracking(); startFahrerApp(); }
function startFahrerApp(){
  renderFahrer();
  if(window._fahrerRefresh) clearInterval(window._fahrerRefresh);
  window._fahrerRefresh=setInterval(function(){if(currentRole==='fahrer') renderFahrer();},8000);
}
function startGpsTracking(){
  if(!navigator.geolocation){ _gpsEnabled=false; return; }
  _gpsWatchId=navigator.geolocation.watchPosition(
    function(pos){ _lastPos={lat:pos.coords.latitude,lng:pos.coords.longitude,ts:Date.now()}; saveGpsToDb(); },
    function(err){ _gpsEnabled=false; var msg='GPS nicht verfuegbar.'; if(err.code===1) msg='GPS-Zugriff verweigert. Bitte in den iPhone-Einstellungen unter Datenschutz > Ortungsdienste > Safari aktivieren.'; showGpsError(msg); renderFahrer(); },
    {enableHighAccuracy:false,maximumAge:60000,timeout:15000}
  );
  if(window._gpsInterval) clearInterval(window._gpsInterval);
  window._gpsInterval=setInterval(function(){if(_gpsEnabled&&_lastPos) saveGpsToDb();},60000);
}
function showGpsError(msg){
  openGModal('GPS nicht verfuegbar','','<div style="background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.6">'+msg+'</div><button class="btn btn-ghost btn-full" onclick="closeGModal()">Verstanden</button>');
}
function stopGpsTracking(){
  if(_gpsWatchId!==null){ navigator.geolocation.clearWatch(_gpsWatchId); _gpsWatchId=null; }
  if(window._gpsInterval){ clearInterval(window._gpsInterval); window._gpsInterval=null; }
  var db=getDB(); var emp=db.employees.find(function(e){return e.id===currentUser.id;}); if(emp){ emp.gps=null; saveDB(db); }
}
function saveGpsToDb(){
  if(!_lastPos||!currentUser) return;
  var db=getDB(); var emp=db.employees.find(function(e){return e.id===currentUser.id;});
  if(emp){ emp.gps={lat:_lastPos.lat,lng:_lastPos.lng,ts:_lastPos.ts,active:_gpsEnabled}; saveDB(db); }
}
function toggleGps(){
  _gpsEnabled=!_gpsEnabled;
  if(_gpsEnabled){ startGpsTracking(); }
  else{ stopGpsTracking(); var db=getDB(); var emp=db.employees.find(function(e){return e.id===currentUser.id;}); if(emp&&emp.gps){emp.gps.active=false;saveDB(db);} }
  renderFahrer();
}

// FAHRER RENDER
function renderFahrer(){
  var db=getDB(); var myId=currentUser.id;
  var emp=db.employees.find(function(e){return e.id===myId;}); if(emp) currentUser=emp;
  var allMine=db.rides.filter(function(r){return (r.driverId===myId||r.driverId2===myId)&&r.status!=='done';});
  var today=todayStr();
  var todayR=allMine.filter(function(r){return r.date===today;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var futureR=allMine.filter(function(r){return r.date>today;}).sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
  var gpsColor=_gpsEnabled?'#2ecc71':'#e74c3c';
  var gpsDot='<span style="width:8px;height:8px;border-radius:50%;background:'+gpsColor+';display:inline-block;margin-right:6px;'+(  _gpsEnabled?'box-shadow:0 0 6px #2ecc71':'')+'">'+'</span>';
  var h='<div class="section-header"><div><div class="section-title">Hallo, '+currentUser.name+'</div><div class="section-sub">Deine Fahrten</div></div>';
  h+='<button class="btn btn-ghost" style="padding:6px 14px;font-size:12px;border-color:'+(_gpsEnabled?'rgba(46,204,113,.4)':'rgba(231,76,60,.4)')+'" onclick="toggleGps()">'+gpsDot+(_gpsEnabled?'GPS aktiv':'GPS pausiert')+'</button></div>';
  h+=renderFahrerBrett();
  if(!allMine.length) h+='<div class="empty-state"><p>Keine Fahrten zugewiesen.</p></div>';
  if(todayR.length){ h+='<div style="font-size:13px;font-weight:600;color:#9aa0b8;margin-bottom:10px;text-transform:uppercase">Heute</div>'; todayR.forEach(function(r){h+=fahrerCard(r);}); }
  if(futureR.length){ h+='<hr style="border:none;border-top:1px solid #323748;margin:18px 0">'; h+='<div style="font-size:13px;font-weight:600;color:#9aa0b8;margin-bottom:10px;text-transform:uppercase">Kommende Fahrten</div>'; futureR.forEach(function(r){h+=fahrerCard(r);}); }
  var cdRides=db.rides.filter(function(r){return r.driverId===myId&&r.status==='done'&&r._countdown;});
  cdRides.forEach(function(r){h+=fahrerCardDone(r);});
  document.getElementById('mainContent').innerHTML=h;
  cdRides.forEach(function(r){if(!_cdTimers[r.id]) startCountdown(r.id,r._doneAt);});
}

function renderFahrerBrett(){
  var db=getDB(); if(!db.brett) db.brett=[]; var myId=currentUser.id;
  var myMsgs=db.brett.filter(function(m){ if(m.targetId!=='all'&&m.targetId!==myId) return false; return (m.confirmedBy||[]).indexOf(myId)===-1; });
  if(!myMsgs.length) return '';
  var h='<div style="margin-bottom:20px"><div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em">Schwarzes Brett ('+myMsgs.length+')</div>';
  myMsgs.sort(function(a,b){return b.createdAt-a.createdAt;});
  myMsgs.forEach(function(msg){
    h+='<div class="card" style="border-color:rgba(245,200,66,.4);margin-bottom:10px">';
    h+='<div style="font-size:12px;color:#b0b6cc;margin-bottom:6px">Zentrale'+(msg.date?' &middot; '+fmtDate(msg.date)+(msg.time?' '+msg.time+' Uhr':''):'')+'</div>';
    h+='<div style="font-size:15px;font-weight:600;margin-bottom:12px">'+msg.text+'</div>';
    h+='<button class="btn btn-success btn-full" onclick="fahrerConfirmBrett(this.dataset.id)" data-id="'+msg.id+'">Bestaetigt - Gelesen</button></div>';
  });
  h+='</div>'; return h;
}
function fahrerConfirmBrett(msgId){
  var db=getDB(); if(!db.brett) db.brett=[];
  var msg=db.brett.find(function(m){return m.id===msgId;});
  if(msg){ if(!msg.confirmedBy) msg.confirmedBy=[]; if(msg.confirmedBy.indexOf(currentUser.id)===-1) msg.confirmedBy.push(currentUser.id); saveDB(db); }
  renderFahrer();
}

var STATUS_LABEL={new:'Offen',pending:'Zugewiesen',accepted:'Unterwegs',done:'Abgeschlossen',declined:'Abgelehnt'};
var STATUS_BADGE={new:'badge-new',pending:'badge-pending',accepted:'badge-accepted',done:'badge-done',declined:'badge-declined'};

function fahrerCard(r){
  var isBackup=r.driverId2===currentUser.id&&r.driverId!==currentUser.id;
  var h='<div class="card"><div class="card-header"><div>';
  h+='<div class="card-title">'+r.customerName+'</div>';
  h+='<div class="card-sub">'+r.pickupAddress+(r.destination?' &gt; '+r.destination:'')+(isBackup?' <span style="background:rgba(243,156,18,.15);color:#f39c12;border-radius:4px;font-size:10px;font-weight:700;padding:1px 5px">BACKUP</span>':'')+'</div>';
  h+='</div><span class="badge '+STATUS_BADGE[r.status]+'">'+STATUS_LABEL[r.status]+'</span></div>';
  h+='<div class="info-grid"><div class="info-item"><label>Datum</label><span>'+fmtDate(r.date)+'</span></div><div class="info-item"><label>Uhrzeit</label><span>'+r.time+' Uhr</span></div></div>';
  // Warnung bei besonderer Befoerderungsart
  var vtWarn={rollstuhl:'Rollstuhlgerecht - Rollstuhl mitnehmen!',trage:'Tragestuhl erforderlich!',liege:'Liegetransport - Trage mitnehmen!'};
  if(r.vehicleType&&vtWarn[r.vehicleType]){
    h+='<div style="background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.5);border-radius:8px;padding:12px 14px;margin-bottom:4px;display:flex;align-items:center;gap:10px">';
    h+='<span style="font-size:20px">!</span>';
    h+='<div><div style="font-size:12px;color:#e74c3c;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Achtung</div>';
    h+='<div style="font-size:14px;font-weight:600;color:#fff">'+vtWarn[r.vehicleType]+'</div></div></div>';
  }
  if(r.status==='pending'){
    h+='<div class="btn-row"><button class="btn btn-success" onclick="fahrerAccept(this.dataset.id)" data-id="'+r.id+'">Annehmen</button>';
    h+='<button class="btn btn-danger" onclick="fahrerDeclinePrompt(this.dataset.id)" data-id="'+r.id+'">Ablehnen</button></div>';
  } else if(r.status==='accepted'){
    if(r.tsAccepted) h+='<div style="font-size:12px;color:#b0b6cc;margin-top:8px">Angenommen: <strong style="color:#fff">'+fmtTs(r.tsAccepted)+'</strong></div>';
    h+='<div class="btn-row"><button class="btn btn-primary" onclick="fahrerComplete(this.dataset.id)" data-id="'+r.id+'">Fahrt beenden</button>';
    var mf='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(r.pickupAddress)+'&travelmode=driving';
    h+='<button class="btn btn-ghost" style="background:rgba(66,133,244,.18);border-color:rgba(66,133,244,.5);color:#5b9cf6" onclick="navi(this.dataset.url)" data-url="'+mf+'">Abholung navigieren</button>';
    var md='https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(r.destination||r.pickupAddress)+'&travelmode=driving';
    h+='<button class="btn btn-ghost" style="background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.4);color:#2ecc71" onclick="navi(this.dataset.url)" data-url="'+md+'">Zielort navigieren</button></div>';
  }
  h+='</div>'; return h;
}

function fahrerCardDone(r){
  var h='<div class="card" style="border-color:rgba(46,204,113,.3)"><div class="card-header"><div>';
  h+='<div class="card-title">'+r.customerName+'</div><div class="card-sub">'+r.pickupAddress+'</div>';
  h+='</div><span class="badge badge-done">Erledigt</span></div>';
  h+='<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#b0b6cc;margin-top:4px">';
  if(r.tsAccepted) h+='<span>Angenommen: <strong style="color:#fff">'+fmtTs(r.tsAccepted)+'</strong></span>';
  if(r.tsDone) h+='<span>Beendet: <strong style="color:#fff">'+fmtTs(r.tsDone)+'</strong></span>';
  if(r.tsAccepted&&r.tsDone) h+='<span>Dauer: <strong style="color:#fff">'+fmtDuration(r.tsAccepted,r.tsDone)+'</strong></span>';
  h+='</div><div style="margin-top:12px;padding:12px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);border-radius:8px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center">';
  h+='<div><div style="font-size:11px;color:#b0b6cc;margin-bottom:2px">Versehentlich abgeschlossen?</div>';
  h+='<div style="font-family:monospace;font-size:20px;color:#e74c3c;font-weight:600" id="cd-'+r.id+'">1:00</div></div>';
  h+='<button class="btn btn-ghost" style="border-color:rgba(243,156,18,.5);color:#f39c12" onclick="fahrerUndoComplete(this.dataset.id)" data-id="'+r.id+'">Rueckgaengig</button>';
  h+='</div></div></div>'; return h;
}

function fahrerAccept(rideId){
  var db=getDB(); var r=db.rides.find(function(x){return x.id===rideId;});
  if(r){ if(r.driverId2===currentUser.id&&r.driverId!==currentUser.id) r.driverId=currentUser.id; r.driverId2=null; r.status='accepted'; r.tsAccepted=Date.now(); saveDB(db); }
  renderFahrer();
}
function fahrerDeclinePrompt(rideId){
  window._declineRideId=rideId;
  var b='<div class="field"><label>Ablehnungsgrund (Pflicht)</label><textarea id="declineReason" placeholder="Grund eingeben..." style="min-height:80px"></textarea></div>';
  b+='<div style="display:flex;gap:8px"><button class="btn btn-ghost" onclick="closeGModal()">Abbrechen</button><button class="btn btn-danger" style="flex:1" onclick="fahrerDecline()">Ablehnen</button></div>';
  openGModal('Fahrt ablehnen','',b);
}
function fahrerDecline(){
  var reason=(document.getElementById('declineReason').value||'').trim(); if(!reason){ alert('Bitte Grund eingeben.'); return; }
  var db=getDB(); var r=db.rides.find(function(x){return x.id===window._declineRideId;});
  if(r){ r.status='declined'; r.declineReason=reason; r.driverId=null; saveDB(db); }
  closeGModal(); renderFahrer();
}
function fahrerComplete(rideId){
  window._completeRideId=rideId;
  var b='<div style="text-align:center;padding:8px 0 16px"><div style="font-size:15px;font-weight:600;margin-bottom:6px">Fahrt wirklich beenden?</div><div style="font-size:13px;color:#b0b6cc;margin-bottom:20px">Zeitstempel wird jetzt gesetzt.</div>';
  b+='<div style="display:flex;gap:8px"><button class="btn btn-ghost btn-full" onclick="closeGModal()">Abbrechen</button><button class="btn btn-primary btn-full" onclick="doFahrerComplete()">Ja, beenden</button></div></div>';
  openGModal('Fahrt beenden','',b);
}
function doFahrerComplete(){
  var db=getDB(); var r=db.rides.find(function(x){return x.id===window._completeRideId;});
  if(r){ r.status='done'; r.tsDone=Date.now(); r._countdown=true; r._doneAt=Date.now(); pruneOldRides(db); saveDB(db); }
  closeGModal(); renderFahrer(); startCountdown(window._completeRideId,Date.now());
}
function fahrerUndoComplete(rideId){
  var db=getDB(); var r=db.rides.find(function(x){return x.id===rideId;});
  if(r){ r.status='accepted'; r.tsDone=null; r._countdown=false; saveDB(db); }
  if(_cdTimers[rideId]){ clearInterval(_cdTimers[rideId]); delete _cdTimers[rideId]; }
  renderFahrer();
}

var _cdTimers={};
function startCountdown(rideId,startedAt){
  var end=startedAt+60000;
  if(_cdTimers[rideId]) clearInterval(_cdTimers[rideId]);
  _cdTimers[rideId]=setInterval(function(){
    var left=Math.max(0,Math.ceil((end-Date.now())/1000));
    var el=document.getElementById('cd-'+rideId); if(el) el.textContent=Math.floor(left/60)+':'+pad(left%60);
    if(left<=0){
      clearInterval(_cdTimers[rideId]); delete _cdTimers[rideId];
      var db=getDB(); var r=db.rides.find(function(x){return x.id===rideId;}); if(r){ r._countdown=false; saveDB(db); }
      if(currentRole==='fahrer') renderFahrer();
    }
  },1000);
}

function openNewEmp(){

function saveEmp(id){
  var first=(document.getElementById('eFirst').value||'').trim(); var last=(document.getElementById('eLast').value||'').trim();
  var user=(document.getElementById('eUser').value||'').trim().toLowerCase(); var pass=document.getElementById('ePass').value;
  if(!first||!last||!user){ alert('Alle Felder ausser Passwort sind Pflicht.'); return; }
  var db=getDB();
  if(id){ var e=db.employees.find(function(x){return x.id===id;}); if(e){e.name=first+' '+last;e.username=user;if(pass)e.password=pass;} }
  else{ if(!pass){ alert('Passwort vergeben.'); return; } db.employees.push({id:uid(),name:first+' '+last,username:user,password:pass,active:true,online:false,gps:null}); }
  saveDB(db); closeGModal(); renderAdminEmp();
}

function changePassword(which){
  loadPasswords(); var db=getDB(); var pw=db.passwords||{zentrale:'0662',admin:'0662'};
  var pre=which==='zentrale'?'pwZentr':'pwAdmin';
  var altEl=document.getElementById(pre+'Alt'); var neuEl=document.getElementById(pre+'Neu'); var neu2El=document.getElementById(pre+'Neu2');
  if(!altEl||!neuEl||!neu2El) return;
  var alt=altEl.value.trim(); var neu=neuEl.value.trim(); var neu2=neu2El.value.trim();
  var current=which==='zentrale'?PASS_ZENTRALE:PASS_ADMIN;
  if(alt!==current){ altEl.style.borderColor='#e74c3c'; altEl.value=''; altEl.placeholder='Falsches Passwort!'; return; }
  if(neu.length<4){ alert('Mind. 4 Zeichen.'); return; }
  if(neu!==neu2){ neu2El.style.borderColor='#e74c3c'; neu2El.value=''; neu2El.placeholder='Passwoerter stimmen nicht ueberein!'; return; }
  pw[which]=neu; db.passwords=pw; saveDB(db); loadPasswords();
  openGModal('Passwort geaendert','','<div style="text-align:center;padding:16px 0"><div style="font-size:32px;margin-bottom:10px;color:#2ecc71">OK</div><div style="font-size:15px;font-weight:600;margin-bottom:20px">Passwort fuer '+(which==='zentrale'?'Zentrale':'Admin')+' wurde geaendert.</div><button class="btn btn-primary btn-full" onclick="closeGModal()">Schliessen</button></div>');
}

// ERINNERUNGS-CHECKER
function checkReminders(){
  if(currentRole!=='zentrale') return;
  var db=getDB();
  var now=Date.now();
  var due=db.rides.filter(function(r){
    return r.reminderTs && !r.reminderDismissed && r.status==='new' && r.reminderTs<=now && r.date>=todayStr();
  });
  if(!due.length) return;
  // Show reminder banner if not already shown
  var existing=document.getElementById('reminderBanner');
  if(existing) return; // already showing
  var r=due[0]; // Show first due reminder
  var mins=Math.round((new Date(r.date+'T'+r.time+':00').getTime()-now)/60000);
  var timeStr=mins<=0?'JETZT!':mins<60?'in '+mins+' Min':mins<120?'in 1 Std':mins<1440?'in '+Math.round(mins/60)+' Std':'in '+Math.round(mins/1440)+' Tag(en)';
  var banner=document.createElement('div');
  banner.id='reminderBanner';
  banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:999;background:linear-gradient(135deg,#e74c3c,#c0392b);padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.5)';
  banner.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px"><div style="flex:1"><div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:3px">Erinnerung</div><div style="font-size:15px;font-weight:700;color:#fff">'+r.customerName+'</div></div></div>';
  document.body.appendChild(banner);
}

function dismissReminder(){
  var rideId=window._currentReminderId;
  var b=document.getElementById('reminderBanner');
  if(b) b.remove();
  var db=getDB();
  var r=db.rides.find(function(x){return x.id===rideId;});
  if(r){ r._reminderSnoozedUntil=Date.now()+(5*60000); saveDB(db); }
}

function reminderGoTo(){
  var rideId=window._currentReminderId;
  var b=document.getElementById('reminderBanner');
  if(b) b.remove();
  zActiveTab=0;
  document.querySelectorAll('.nav-tab').forEach(function(t,i){t.classList.toggle('active',i===0);});
  renderZToday();
  setTimeout(function(){ openAssign(rideId); },300);
}

// Override checkReminders to respect snooze
var _origCheckReminders=checkReminders;
checkReminders=function(){
  if(currentRole!=='zentrale') return;
  var db=getDB();
  var now=Date.now();
  var due=db.rides.filter(function(r){
    return r.reminderTs && !r.reminderDismissed && r.status==='new' && r.reminderTs<=now && r.date>=todayStr() && (!r._reminderSnoozedUntil||r._reminderSnoozedUntil<=now);
  });
  if(!due.length){ var ex=document.getElementById('reminderBanner'); if(ex) ex.remove(); return; }
  var existing=document.getElementById('reminderBanner');
  if(existing) return;
  var r=due[0];
  var mins=Math.round((new Date(r.date+'T'+r.time+':00').getTime()-now)/60000);
  var timeStr=mins<=0?'JETZT SOFORT!':mins<60?'in '+mins+' Min':mins<120?'in 1 Std':mins<1440?'in '+Math.round(mins/60)+' Std':'in '+Math.round(mins/1440)+' Tag(en)';
  var banner=document.createElement('div');
  banner.id='reminderBanner';
  banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#e74c3c,#c0392b);padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:reminderPulse 2s ease-in-out infinite';
  window._currentReminderId=r.id;
  banner.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">'
    +'<div style="flex:1">'
    +'<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.8);margin-bottom:3px">Erinnerung - Fahrer zuweisen!</div>'
    +'<div style="font-size:15px;font-weight:700;color:#fff">'+r.customerName+'</div>'
    +'<div style="font-size:13px;color:rgba(255,255,255,.9);margin-top:2px">'+fmtDate(r.date)+' '+r.time+' Uhr - '+timeStr+'</div>'
    +'</div>'
    +'<div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">'
    +'<button onclick="dismissReminder()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600">5 Min</button>'
    +'<button onclick="reminderGoTo()" style="background:#fff;border:none;color:#c0392b;padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:700">Zuweisen</button>'
    +'</div></div>';
  document.body.appendChild(banner);
};

// Add CSS for pulse animation
document.head.insertAdjacentHTML('beforeend','<style>@keyframes reminderPulse{0%,100%{box-shadow:0 4px 20px rgba(231,76,60,.5)}50%{box-shadow:0 4px 40px rgba(231,76,60,.9),0 0 0 4px rgba(231,76,60,.3)}}</style>');

// Start reminder check every 60 seconds
setInterval(checkReminders, 60000);

init();
